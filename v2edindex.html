<script type="text/babel">

// Physiology Tab — Altitude slider + discover equations + alveolus + O2 curve

const WAYPOINTS = [
  { alt: 0,    label: "Sea Level",       sublabel: "New York" },
  { alt: 1609, label: "Denver",          sublabel: "Mile High City" },
  { alt: 2400, label: "Ski Resort",      sublabel: "Typical ski area" },
  { alt: 3500, label: "High Camp",       sublabel: "Common trek camp" },
  { alt: 4300, label: "EBC Approach",    sublabel: "Namche Bazaar region" },
  { alt: 5364, label: "Everest Base",    sublabel: "5,364 m" },
  { alt: 7000, label: "Death Zone",      sublabel: "7,000 m" },
  { alt: 8849, label: "Everest Summit",  sublabel: "8,849 m" },
];

function calcPB(alt) { return Math.round(760 * Math.exp(-alt / 8150)); }
function calcPiO2(pb) { return Math.round(0.2093 * (pb - 47)); }
function calcPaCO2(alt) { return Math.max(15, Math.round(40 - alt * 0.0028)); }
function calcPAO2(piO2, paCO2) { return Math.round(piO2 - paCO2 / 0.8); }
function calcSpO2(pao2) {
  const p50 = 27, n = 2.7;
  return Math.min(99, Math.max(40, Math.round(Math.pow(pao2, n) / (Math.pow(p50, n) + Math.pow(pao2, n)) * 100)));
}
function altColor(alt) {
  if (alt < 1500) return "var(--c-green)";
  if (alt < 3500) return "var(--c-amber)";
  if (alt < 5500) return "var(--c-orange)";
  return "var(--c-red)";
}

// ─── Alveolus / Capillary Exchange Diagram ───────────────────────────────────

function AlveolusSection({ alt }) {
  const pb   = calcPB(alt);
  const piO2 = calcPiO2(pb);
  const paCO2 = calcPaCO2(alt);
  const paO2  = calcPAO2(piO2, paCO2);
  const spO2  = calcSpO2(paO2);
  const col   = altColor(alt);

  // O2 gradient drives arrow size (sea level gradient ≈ 149-100 = 49; at alt much less)
  const o2Gradient = Math.max(5, paO2 - 40); // simplified venous PO2 ~40
  const arrowOpacity = Math.min(1, 0.3 + (o2Gradient / 80) * 0.7);

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #e8ecf0", boxShadow: "0 1px 4px rgba(0,0,0,0.05)", marginBottom: 24 }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: "#8a96a3", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4 }}>Alveolar-Capillary Gas Exchange</div>
      <div style={{ fontSize: 13.5, color: "#555", marginBottom: 18 }}>
        Visualizing how O₂ moves from air → alveolus → blood at {alt.toLocaleString()} m
      </div>

      {/* Inspired air bar */}
      <div style={{ background: "oklch(0.96 0.03 220)", borderRadius: 10, padding: "10px 16px", marginBottom: 10, display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#8a96a3", textTransform: "uppercase", letterSpacing: "0.06em", minWidth: 100 }}>Inspired Air</div>
        <div style={{ fontSize: 13.5 }}>PB = <strong style={{ color: col }}>{pb} mmHg</strong></div>
        <div style={{ fontSize: 13.5 }}>PiO₂ = <strong style={{ color: col }}>{piO2} mmHg</strong></div>
        <div style={{ fontSize: 13.5, color: "#888" }}>FiO₂ = 20.93% (unchanged at any altitude)</div>
      </div>

      {/* Arrow down into alveolus */}
      <div style={{ display: "flex", justifyContent: "center", color: col, fontSize: 18, marginBottom: 4 }}>↓</div>

      {/* Main exchange area */}
      <div style={{ display: "flex", gap: 0, borderRadius: 12, overflow: "hidden", border: "1px solid #e0e8f0" }}>

        {/* Alveolus */}
        <div style={{ flex: 1, background: "oklch(0.95 0.05 225)", padding: "18px 16px" }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: "var(--c-blue)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Alveolus</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            <Stat label="PAO₂" value={`${paO2} mmHg`} color={col}
              note={paO2 < 60 ? "⚠ Steep curve territory" : paO2 < 80 ? "Moderate hypoxia" : "Normal range"} />
            <Stat label="PACO₂" value={`${paCO2} mmHg`} color="var(--c-blue)"
              note={paCO2 < 30 ? "↓ Hyperventilation" : "Normal"} />
            <Stat label="A-a gradient" value={`${Math.max(0, piO2 - paO2)} mmHg`} color="#888"
              note="PiO₂ − PAO₂; reflects diffusion + V/Q" />
          </div>
        </div>

        {/* Exchange membrane + arrows */}
        <div style={{ width: 72, background: "#f5f5f5", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, padding: "12px 4px", position: "relative" }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.05em", textAlign: "center", marginBottom: 4 }}>Membrane</div>
          {/* O2 arrow */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "var(--c-blue)", opacity: arrowOpacity }}>O₂</div>
            <div style={{ fontSize: 20, color: "var(--c-blue)", opacity: arrowOpacity, lineHeight: 1 }}>→</div>
          </div>
          {/* Membrane line */}
          <div style={{ width: 40, height: 2, background: "#d0d8e0", borderRadius: 1 }} />
          {/* CO2 arrow */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
            <div style={{ fontSize: 20, color: "var(--c-orange)", lineHeight: 1 }}>←</div>
            <div style={{ fontSize: 10, fontWeight: 700, color: "var(--c-orange)" }}>CO₂</div>
          </div>
        </div>

        {/* Capillary */}
        <div style={{ flex: 1, background: "oklch(0.96 0.04 18)", padding: "18px 16px" }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: "var(--c-red)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Pulmonary Capillary</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            <Stat label="PaO₂" value={`~${Math.max(10, paO2 - 7)} mmHg`} color={col}
              note="Slightly below PAO₂ (normal A-a gap)" />
            <Stat label="SaO₂" value={`${spO2}%`} color={col}
              note={spO2 < 75 ? "Severe hypoxemia" : spO2 < 88 ? "Significant hypoxemia" : spO2 < 94 ? "Mild hypoxemia" : "Normal"} />
            <Stat label="PvCO₂" value={`~${paCO2 + 6} mmHg`} color="var(--c-orange)"
              note="Venous CO₂ driving diffusion" />
          </div>
        </div>
      </div>

      {paO2 < 60 && (
        <div style={{ marginTop: 10, fontSize: 13, color: "var(--c-orange)", background: "oklch(0.96 0.05 45)", borderRadius: 8, padding: "8px 12px" }}>
          ⚠ PAO₂ &lt; 60 mmHg — on the steep portion of the O₂-Hb dissociation curve. Small further drops cause large SaO₂ falls.
        </div>
      )}
    </div>
  );
}

function Stat({ label, value, color, note }) {
  return (
    <div>
      <span style={{ fontSize: 11, fontWeight: 600, color: "#8a96a3", marginRight: 6 }}>{label}</span>
      <span style={{ fontFamily: "DM Mono, monospace", fontSize: 14, fontWeight: 700, color }}>{value}</span>
      {note && <div style={{ fontSize: 11, color: "#999", marginTop: 1 }}>{note}</div>}
    </div>
  );
}

// ─── O₂-Hb Dissociation Curve ────────────────────────────────────────────────

function O2CurveSection({ alt }) {
  const [showShifts, setShowShifts] = React.useState(true);

  const pb    = calcPB(alt);
  const piO2  = calcPiO2(pb);
  const paCO2 = calcPaCO2(alt);
  const paO2  = calcPAO2(piO2, paCO2);
  const col   = altColor(alt);

  function hillSat(pO2, p50, n = 2.7) {
    if (pO2 <= 0) return 0;
    return (Math.pow(pO2, n) / (Math.pow(p50, n) + Math.pow(pO2, n))) * 100;
  }

  const W = 420, H = 260;
  const pl = 50, pr = 20, pt = 22, pb_ = 46;
  const plotW = W - pl - pr, plotH = H - pt - pb_;
  const maxPO2 = 160;

  const xS = v => pl + (v / maxPO2) * plotW;
  const yS = v => pt + plotH - (v / 100) * plotH;

  function makePath(p50) {
    return Array.from({ length: 81 }, (_, i) => {
      const p = i * 2;
      return `${i === 0 ? 'M' : 'L'}${xS(p).toFixed(1)},${yS(hillSat(p, p50)).toFixed(1)}`;
    }).join(' ');
  }

  const currentSat = hillSat(paO2, 27);
  const cx = xS(paO2);
  const cy = yS(currentSat);

  const xTicks = [0, 20, 40, 60, 80, 100, 120, 140, 160];
  const yTicks = [0, 25, 50, 75, 100];

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #e8ecf0", boxShadow: "0 1px 4px rgba(0,0,0,0.05)", marginBottom: 24 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#8a96a3", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4 }}>Oxyhemoglobin Dissociation Curve</div>
          <div style={{ fontSize: 13.5, color: "#555" }}>
            At {alt.toLocaleString()} m: PAO₂ = <strong style={{ color: col }}>{paO2} mmHg</strong> → SaO₂ ≈ <strong style={{ color: col }}>{Math.round(currentSat)}%</strong>
          </div>
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: "#888", cursor: "pointer", userSelect: "none" }}>
          <input type="checkbox" checked={showShifts} onChange={e => setShowShifts(e.target.checked)} style={{ accentColor: "var(--c-blue)" }} />
          Show curve shifts
        </label>
      </div>

      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: "block", maxWidth: W }}>
        {/* Grid */}
        {yTicks.map(v => <line key={v} x1={pl} y1={yS(v)} x2={pl+plotW} y2={yS(v)} stroke="#f0f2f5" strokeWidth={1} />)}
        {xTicks.map(v => <line key={v} x1={xS(v)} y1={pt} x2={xS(v)} y2={pt+plotH} stroke="#f0f2f5" strokeWidth={1} />)}

        {/* Fills under curves */}
        <clipPath id="plotClip">
          <rect x={pl} y={pt} width={plotW} height={plotH} />
        </clipPath>
        <path d={makePath(27) + ` L${xS(160)},${pt+plotH} L${pl},${pt+plotH} Z`}
          fill="var(--c-blue)" opacity={0.06} clipPath="url(#plotClip)" />

        {/* Shift curves */}
        {showShifts && <>
          <path d={makePath(22)} stroke="var(--c-green)" strokeWidth={1.8} fill="none" strokeDasharray="6 3" opacity={0.7} />
          <path d={makePath(32)} stroke="var(--c-orange)" strokeWidth={1.8} fill="none" strokeDasharray="6 3" opacity={0.7} />
        </>}

        {/* Normal curve */}
        <path d={makePath(27)} stroke="var(--c-blue)" strokeWidth={2.8} fill="none" />

        {/* Sea-level reference */}
        {alt > 100 && (
          <>
            <circle cx={xS(100)} cy={yS(hillSat(100, 27))} r={5} fill="none" stroke="#ccc" strokeWidth={1.5} />
            <text x={xS(100)+7} y={yS(hillSat(100,27))-5} fontSize={9} fill="#bbb">Sea level</text>
          </>
        )}

        {/* Danger zone shading: PaO2 < 60 */}
        <rect x={pl} y={pt} width={xS(60)-pl} height={plotH}
          fill="var(--c-red)" opacity={0.04} clipPath="url(#plotClip)" />
        <line x1={xS(60)} y1={pt} x2={xS(60)} y2={pt+plotH} stroke="var(--c-red)" strokeWidth={1} strokeDasharray="4 3" opacity={0.25} />
        <text x={xS(60)-2} y={pt+plotH-4} textAnchor="end" fontSize={9} fill="var(--c-red)" opacity={0.6}>Steep region</text>

        {/* Crosshairs */}
        <line x1={cx} y1={pt} x2={cx} y2={pt+plotH} stroke={col} strokeWidth={1.2} strokeDasharray="3 2" opacity={0.7} />
        <line x1={pl} y1={cy} x2={pl+plotW} y2={cy} stroke={col} strokeWidth={1.2} strokeDasharray="3 2" opacity={0.7} />

        {/* Current dot */}
        <circle cx={cx} cy={cy} r={8} fill={col} stroke="#fff" strokeWidth={2.5} />
        <text x={cx} y={pt+plotH+30} textAnchor="middle" fontSize={10} fill={col} fontWeight="700">{paO2}</text>
        <text x={pl-8} y={cy+4} textAnchor="end" fontSize={10} fill={col} fontWeight="700">{Math.round(currentSat)}</text>

        {/* Axes */}
        <line x1={pl} y1={pt} x2={pl} y2={pt+plotH} stroke="#c8d0da" strokeWidth={1.5} />
        <line x1={pl} y1={pt+plotH} x2={pl+plotW} y2={pt+plotH} stroke="#c8d0da" strokeWidth={1.5} />
        {xTicks.map(v => (
          <g key={v}>
            <line x1={xS(v)} y1={pt+plotH} x2={xS(v)} y2={pt+plotH+4} stroke="#c8d0da" strokeWidth={1} />
            <text x={xS(v)} y={pt+plotH+16} textAnchor="middle" fontSize={9} fill="#aaa">{v}</text>
          </g>
        ))}
        {yTicks.map(v => (
          <g key={v}>
            <line x1={pl-4} y1={yS(v)} x2={pl} y2={yS(v)} stroke="#c8d0da" strokeWidth={1} />
            <text x={pl-8} y={yS(v)+3} textAnchor="end" fontSize={9} fill="#aaa">{v}</text>
          </g>
        ))}

        {/* Axis titles */}
        <text x={pl+plotW/2} y={H-4} textAnchor="middle" fontSize={11} fill="#999">PaO₂ (mmHg)</text>
        <text transform={`rotate(-90,13,${pt+plotH/2})`} x={13} y={pt+plotH/2+4} textAnchor="middle" fontSize={11} fill="#999">SaO₂ (%)</text>

        {/* Legend */}
        {showShifts && <>
          <line x1={pl+plotW-140} y1={pt+10} x2={pl+plotW-122} y2={pt+10} stroke="var(--c-green)" strokeWidth={1.8} strokeDasharray="6 3" />
          <text x={pl+plotW-118} y={pt+14} fontSize={9} fill="#888">Leftward — acute alkalosis</text>
          <line x1={pl+plotW-140} y1={pt+24} x2={pl+plotW-122} y2={pt+24} stroke="var(--c-blue)" strokeWidth={2.5} />
          <text x={pl+plotW-118} y={pt+28} fontSize={9} fill="#888">Normal (P₅₀ = 27 mmHg)</text>
          <line x1={pl+plotW-140} y1={pt+38} x2={pl+plotW-122} y2={pt+38} stroke="var(--c-orange)" strokeWidth={1.8} strokeDasharray="6 3" />
          <text x={pl+plotW-118} y={pt+42} fontSize={9} fill="#888">Rightward — ↑2,3-DPG, acidosis</text>
        </>}
      </svg>

      {paO2 < 60 && (
        <div style={{ marginTop: 8, fontSize: 12.5, color: "var(--c-red)", background: "oklch(0.96 0.04 16)", borderRadius: 8, padding: "8px 12px", border: "1px solid oklch(0.85 0.10 16)" }}>
          ⚠ On the steep portion — small ↓ PaO₂ → large ↓ SaO₂. Hemoglobin O₂ delivery is critically impaired.
        </div>
      )}
    </div>
  );
}

// ─── Discover Cards ───────────────────────────────────────────────────────────

function MathLine({ formula, result, note }) {
  return (
    <div style={{ marginBottom: 2 }}>
      <span style={{ fontFamily: "DM Mono, monospace", fontSize: 13, color: "#2a3445" }}>{formula}</span>

function AltSlider({ alt, setAlt }) {
  const col = altColor(alt);
  const nearest = WAYPOINTS.reduce((a, b) => Math.abs(b.alt - alt) < Math.abs(a.alt - alt) ? b : a);
  const pb = calcPB(alt), piO2 = calcPiO2(calcPB(alt));
  const paCO2 = calcPaCO2(alt), paO2 = calcPAO2(piO2, paCO2);
  const spO2 = calcSpO2(paO2);

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "28px 28px 22px", border: "1px solid #e8ecf0", boxShadow: "0 1px 6px rgba(0,0,0,0.06)", marginBottom: 24 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#8a96a3", letterSpacing: "0.06em", textTransform: "uppercase" }}>Altitude Explorer</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: col, marginTop: 2, fontVariantNumeric: "tabular-nums" }}>{alt.toLocaleString()} m</div>
          <div style={{ fontSize: 14, color: "#555", marginTop: 1 }}>{nearest.label} — {nearest.sublabel}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 12, color: "#aaa", marginBottom: 4 }}>Estimated SpO₂</div>
          <div style={{ fontSize: 32, fontWeight: 700, color: col, fontVariantNumeric: "tabular-nums" }}>{spO2}%</div>
        </div>
      </div>
      <input type="range" min={0} max={8849} step={50} value={alt}
        onChange={e => { const v = Number(e.target.value); setAlt(v); e.target.style.setProperty("--pct", ((v/8849)*100)+"%"); }}

function PhysiologyCards({ alt }) {
  const pb = calcPB(alt), piO2 = calcPiO2(pb), paCO2 = calcPaCO2(alt), paO2 = calcPAO2(piO2, paCO2);
  const col = altColor(alt);
  return (
    <div style={{ display: "flex", gap: 12, marginBottom: 24, flexWrap: "wrap" }}>
      <DiscoverCard title="Barometric Pressure" value={pb} unit="mmHg" accent={col}
        intuition={alt === 0 ? "At sea level, the full weight of the atmosphere presses down — 760 mmHg." : `At ${alt.toLocaleString()} m, less atmosphere above you. PB has dropped ${760-pb} mmHg (${Math.round((760-pb)/760*100)}% below sea level).`}
        mathLabel="Hüppert / West equation"
        mathContent={<>
          <MathLine formula={`PB = 760 × e^(−${alt} / 8150)`} />
          <MathLine formula={`PB = 760 × ${Math.exp(-alt/8150).toFixed(3)}`} result={`${pb} mmHg`} note="Himalayan-corrected (West 2009)" />
        </>} />

      <div style={{ display: "flex", alignItems: "center", fontSize: 18, color: "#ddd", flexShrink: 0 }}>→</div>

      <DiscoverCard title="Inspired PO₂ (PiO₂)" value={piO2} unit="mmHg" accent={col}
        intuition={`O₂ is 20.93% of air at any altitude — but applied to a lower PB. Body humidity adds 47 mmHg water vapor that displaces O₂. Net: ${piO2} mmHg vs. 149 at sea level.`}
        mathLabel="Dalton's Law of Partial Pressures"
        mathContent={<>
          <MathLine formula="PiO₂ = FiO₂ × (PB − PH₂O)" />
          <MathLine formula={`PiO₂ = 0.2093 × (${pb} − 47)`} result={`${piO2} mmHg`} note="PH₂O = 47 mmHg at 37°C" />
        </>} />

      <div style={{ display: "flex", alignItems: "center", fontSize: 18, color: "#ddd", flexShrink: 0 }}>→</div>

      <DiscoverCard title="Alveolar PO₂ (PAO₂)" value={paO2} unit="mmHg" accent={col}
        intuition={`CO₂ from blood dilutes O₂ in alveoli. Hyperventilation lowers PaCO₂ to ~${paCO2} mmHg (vs. 40 at sea level), raising PAO₂. Without it: PAO₂ = ${Math.round(piO2 - 40/0.8)} mmHg.`}
        mathLabel="Alveolar Gas Equation"
        mathContent={<>
          <MathLine formula="PAO₂ = PiO₂ − PaCO₂ / R" />
          <MathLine formula={`PAO₂ = ${piO2} − ${paCO2} / 0.8`} result={`${paO2} mmHg`} note={`Acclimatized PaCO₂ at this altitude ≈ ${paCO2} mmHg`} />
        </>} />
    </div>
  );
}

  "AMS & HACE": "var(--c-orange)",

function getFilteredQuestions(cat) {
  if (!window.ALTITUDE_QUIZ) return [];
  if (cat === "All Topics") return window.ALTITUDE_QUIZ;
  return window.ALTITUDE_QUIZ.filter(q => q.category === cat);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  const pct = Math.round((current / total) * 100);

        </div>
        <div style={{ display: "flex", gap: 14, fontSize: 13 }}>
          <span style={{ color: "var(--c-green)", fontWeight: 700 }}>✓ {correct}</span>
          <span style={{ color: "var(--c-red)", fontWeight: 700 }}>✗ {incorrect}</span>
        </div>
      </div>
      <div style={{ height: 6, background: "#edf0f4", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: "var(--c-blue)", borderRadius: 3, transition: "width 0.4s ease" }} />
      </div>
    </div>
  );
}

function QuestionCard({ q, qNum, total, onAnswer, answered, selectedId, correct, incorrect }) {
  const [selected, setSelected] = React.useState(null);
  const [revealed, setRevealed] = React.useState(false);

  React.useEffect(() => {
    setSelected(null);
    setRevealed(false);
  }, [q.id]);

  function handleSelect(id) {
    if (revealed) return;
    setSelected(id);
  }

  function handleReveal() {
    if (!selected) return;
    setRevealed(true);
    const isCorrect = selected === q.correct;
    onAnswer(isCorrect);
  }

  function optionStyle(id) {
    const base = {
      padding: "13px 16px", borderRadius: 10, border: "1.5px solid",
      cursor: revealed ? "default" : selected === id ? "default" : "pointer",
      marginBottom: 8, display: "flex", gap: 12, alignItems: "flex-start",
      transition: "all 0.15s", fontSize: 14, lineHeight: 1.5,
      background: "#fff", borderColor: "#e0e4ea", color: "#333"
    };
    if (!revealed) {
      if (selected === id) return { ...base, borderColor: "var(--c-blue)", background: "oklch(0.96 0.04 220)", color: "#1a3060" };
      return { ...base };
    }
    if (id === q.correct) return { ...base, borderColor: "var(--c-green)", background: "oklch(0.95 0.05 150)", color: "#0a3020" };
    if (id === selected && id !== q.correct) return { ...base, borderColor: "var(--c-red)", background: "oklch(0.95 0.05 16)", color: "#3a0a0a" };
    return { ...base, opacity: 0.5 };
  }

  function optionIcon(id) {
    if (!revealed) return selected === id ? "◉" : "○";
    if (id === q.correct) return "✓";
    if (id === selected && id !== q.correct) return "✗";
    return "○";
  }

  const catColor = CAT_COLORS[q.category] || "var(--c-blue)";

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "26px 28px", border: "1px solid #e8ecf0", boxShadow: "0 1px 6px rgba(0,0,0,0.06)" }}>
      {/* Category tag */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "center" }}>
        <span style={{ fontSize: 11.5, fontWeight: 700, color: catColor, background: "oklch(0.96 0.01 225)", padding: "3px 10px", borderRadius: 10, letterSpacing: "0.04em" }}>
          {q.category}
        </span>
        {q.wms_ref && (
          <span style={{ fontSize: 11.5, fontWeight: 600, color: "var(--c-blue)", background: "oklch(0.94 0.05 220)", padding: "3px 10px", borderRadius: 10 }}>
            WMS Guideline
          </span>
        )}
      </div>

      {/* Stem */}
      <div style={{ fontSize: 15.5, color: "#1e2d3d", lineHeight: 1.7, marginBottom: 22, fontWeight: 400 }}>
        {q.stem}
      </div>

      {/* Options */}
      <div style={{ marginBottom: 16 }}>
        {q.options.map(opt => (
          <div key={opt.id} style={optionStyle(opt.id)} onClick={() => handleSelect(opt.id)}>
            <span style={{
              fontWeight: 700, flexShrink: 0, width: 20, fontSize: 14,
              color: revealed
                ? opt.id === q.correct ? "var(--c-green)"
                  : opt.id === selected ? "var(--c-red)" : "#ccc"
                : selected === opt.id ? "var(--c-blue)" : "#aaa"
            }}>
              {optionIcon(opt.id)}
            </span>
            <span><strong>{opt.id}.</strong> {opt.text}</span>
          </div>
        ))}
      </div>

      {/* Reveal / Next buttons */}
      {!revealed ? (
        <button
          onClick={handleReveal}
          disabled={!selected}
          style={{
            padding: "11px 28px", borderRadius: 10, border: "none",
            background: selected ? "var(--c-blue)" : "#e0e4ea",
            color: selected ? "#fff" : "#aaa",
            fontSize: 14, fontWeight: 700, cursor: selected ? "pointer" : "default",
            fontFamily: "inherit", transition: "all 0.18s"
          }}>
          Submit Answer
        </button>
      ) : (
        <div>
          {/* Result banner */}
          <div style={{
            padding: "10px 16px", borderRadius: 10, marginBottom: 14,
            background: selected === q.correct ? "oklch(0.95 0.06 150)" : "oklch(0.95 0.05 16)",
            border: `1px solid ${selected === q.correct ? "oklch(0.82 0.12 150)" : "oklch(0.75 0.14 16)"}`,
            display: "flex", alignItems: "center", gap: 10
          }}>
            <span style={{ fontSize: 20 }}>{selected === q.correct ? "✓" : "✗"}</span>
            <span style={{ fontWeight: 700, color: selected === q.correct ? "var(--c-green)" : "var(--c-red)", fontSize: 14 }}>
              {selected === q.correct ? "Correct!" : `Incorrect — The answer is ${q.correct}`}
            </span>
          </div>

          {/* Explanation */}
          <div style={{ background: "oklch(0.97 0.01 225)", borderRadius: 10, padding: "14px 16px", marginBottom: 16, border: "1px solid #e4e8ec" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#8a96a3", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 6 }}>Explanation</div>
            <div style={{ fontSize: 13.5, color: "#333", lineHeight: 1.7 }}>{q.explanation}</div>
            {q.wms_ref && (
              <div style={{ marginTop: 10, display: "flex", gap: 7, alignItems: "flex-start" }}>
                <span style={{ fontSize: 11, fontWeight: 800, color: "var(--c-blue)", flexShrink: 0, marginTop: 1 }}>WMS</span>
                <span style={{ fontSize: 12.5, color: "#446", fontStyle: "italic" }}>{q.wms_ref}</span>
              </div>
            )}
          </div>

          <button
            onClick={() => onAnswer(null, true)}
            style={{
              padding: "11px 28px", borderRadius: 10, border: "none",
              background: "var(--c-blue)", color: "#fff",
              fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit"
            }}>
            Next Question →
          </button>
        </div>
      )}
    </div>
  );
}

function ScoreScreen({ correct, total, category, onRestart }) {
  const pct = Math.round((correct / total) * 100);
  const grade = pct >= 80 ? { label: "Excellent", color: "var(--c-green)", msg: "Strong command of the material." }
    : pct >= 60 ? { label: "Good", color: "var(--c-amber)", msg: "Review the topics you missed." }
    : { label: "Needs Review", color: "var(--c-red)", msg: "Revisit the Physiology and Pathology tabs before re-testing." };

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "40px 32px", border: "1px solid #e8ecf0", textAlign: "center", boxShadow: "0 1px 6px rgba(0,0,0,0.06)" }}>
      <div style={{ fontSize: 56, fontWeight: 800, color: grade.color, lineHeight: 1, marginBottom: 6 }}>{pct}%</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: "#1e2d3d", marginBottom: 4 }}>{grade.label}</div>
      <div style={{ fontSize: 14, color: "#777", marginBottom: 8 }}>{correct} of {total} correct — {category}</div>
      <div style={{ fontSize: 14, color: "#555", marginBottom: 30 }}>{grade.msg}</div>
      <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
        <button onClick={() => onRestart(false)} style={{ padding: "11px 24px", borderRadius: 10, border: "none", background: "var(--c-blue)", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
          Retake Same Set
        </button>
        <button onClick={() => onRestart(true)} style={{ padding: "11px 24px", borderRadius: 10, border: "1.5px solid #e0e4ea", background: "#fff", color: "#555", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
          New Shuffle
        </button>
      </div>
    </div>
  );
}

function QuizTab() {
  const [category, setCategory] = React.useState("All Topics");
  const [questions, setQuestions] = React.useState([]);
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [correct, setCorrect] = React.useState(0);
  const [incorrect, setIncorrect] = React.useState(0);
  const [done, setDone] = React.useState(false);

  React.useEffect(() => {
    startQuiz(category, true);
  }, [category]);

  function startQuiz(cat, shuffle) {
    const qs = getFilteredQuestions(cat);
    setQuestions(shuffle ? shuffleArray(qs) : qs);
    setCurrentIdx(0);
    setCorrect(0);
    setIncorrect(0);
    setDone(false);
  }

  function handleAnswer(isCorrect, next) {
    if (next) {
      if (currentIdx + 1 >= questions.length) {
        setDone(true);
      } else {
        setCurrentIdx(i => i + 1);
      }
      return;
    }
    if (isCorrect) setCorrect(c => c + 1);
    else setIncorrect(c => c + 1);
  }

  const q = questions[currentIdx];

  return (
    <div style={{ maxWidth: 780, margin: "0 auto" }}>
      {/* Category filter */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {CATEGORIES.map(cat => (
          <button key={cat} onClick={() => setCategory(cat)}
            style={{
              padding: "7px 16px", borderRadius: 20, border: "1.5px solid",
              borderColor: category === cat ? CAT_COLORS[cat] : "#e0e4ea",
              background: category === cat ? CAT_COLORS[cat] : "#fff",
              color: category === cat ? "#fff" : "#555",
              fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              transition: "all 0.15s"
            }}>
            {cat}
            <span style={{ marginLeft: 6, opacity: 0.7, fontWeight: 400, fontSize: 11 }}>({CAT_COUNTS[cat]})</span>
          </button>
        ))}
      </div>

      {done ? (
        <ScoreScreen correct={correct} total={questions.length} category={category}
          onRestart={(shuffle) => startQuiz(category, shuffle)} />
      ) : q ? (
        <>
          <ProgressBar correct={correct} incorrect={incorrect} total={questions.length} current={currentIdx} />
          <QuestionCard
            key={`${q.id}-${currentIdx}`}
            q={q} qNum={currentIdx + 1} total={questions.length}
            onAnswer={handleAnswer}
          />
        </>
      ) : (
        <div style={{ textAlign: "center", color: "#aaa", padding: 40 }}>Loading questions…</div>
      )}
    </div>
  );
}

Object.assign(window, { QuizTab });

</script>

<!-- APP SHELL -->
<script type="text/babel">
const TABS = [
  { id: "physiology", label: "Physiology",    dot: "var(--c-blue)",   color: "var(--c-blue)"   },
  { id: "hace",       label: "HACE",          dot: "var(--c-orange)", color: "var(--c-orange)" },
  { id: "hape",       label: "HAPE",          dot: "var(--c-red)",    color: "var(--c-red)"    },
  { id: "treatment",  label: "AMS & Drugs",   dot: "var(--c-green)",  color: "var(--c-green)"  },
  { id: "quiz",       label: "Self-Assessment", dot: "oklch(0.50 0.17 280)", color: "oklch(0.50 0.17 280)" },
];

function getTabComponent(id) {
  return { physiology: window.PhysiologyTab, hace: window.HACETab, hape: window.HAPETab, treatment: window.TreatmentTab, quiz: window.QuizTab }[id];
}

function AppWrapper() {
  const stored = localStorage.getItem("alt_tab") || "physiology";
  const [tab, setTab] = React.useState(stored);

  window.__setTab = (t) => {
    setTab(t);
    localStorage.setItem("alt_tab", t);
    document.querySelectorAll(".tab-btn").forEach(b => {
      const active = b.dataset.tab === t;
      b.classList.toggle("active", active);
      if (active) b.style.setProperty("--active-color", b.dataset.color);
    });
  };

  React.useEffect(() => {
    window.__setTab(tab);
    const updateSliders = () => {
      document.querySelectorAll("input[type=range]").forEach(el => {
        const pct = ((el.value - el.min) / (el.max - el.min)) * 100;
        el.style.setProperty("--pct", pct + "%");
      });
    };
    document.addEventListener("input", updateSliders);
    return () => document.removeEventListener("input", updateSliders);
  }, []);

  const ActiveTab = getTabComponent(tab);
  return (
    <div className="tab-panel" key={tab}>
      {ActiveTab ? <ActiveTab /> : <div style={{ color: "#aaa", padding: 40, textAlign: "center" }}>Loading…</div>}
    </div>
  );
}

// Build tab nav
const navEl = document.getElementById("tab-nav");
const storedTab = localStorage.getItem("alt_tab") || "physiology";
navEl.innerHTML = TABS.map(t => `
  <button class="tab-btn ${t.id === storedTab ? 'active' : ''}" data-tab="${t.id}" data-color="${t.color}" style="${t.id === storedTab ? `--active-color:${t.color}` : ''}">
    <span class="tab-dot" style="background:${t.dot}"></span>${t.label}
  </button>`).join("");
navEl.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => window.__setTab && window.__setTab(btn.dataset.tab));
});

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppWrapper />);

// Tweaks
window.addEventListener("message", e => {
  if (e.data?.type === "__activate_edit_mode")   document.getElementById("tweaks-panel").style.display = "block";
  if (e.data?.type === "__deactivate_edit_mode") document.getElementById("tweaks-panel").style.display = "none";
});
window.parent.postMessage({ type: "__edit_mode_available" }, "*");

document.getElementById("tweak-fontsize")?.querySelectorAll(".tweak-opt").forEach(btn => {
  btn.addEventListener("click", () => {
    document.getElementById("tweak-fontsize").querySelectorAll(".tweak-opt").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    document.body.style.fontSize = btn.dataset.val + "px";
  });
});
document.getElementById("tweak-accent")?.querySelectorAll(".tweak-opt").forEach(btn => {
  btn.addEventListener("click", () => {
    document.getElementById("tweak-accent").querySelectorAll(".tweak-opt").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    document.documentElement.style.setProperty("--c-blue", btn.dataset.val);
  });
});
</script>
</body>
